function Pill({ children, tone = 'neutral', size = 'md' }) {
  const tones = {
    neutral: { fg: 'var(--ink-3)', bg: 'var(--bg)',       bd: 'var(--line-2)' },
    success: { fg: 'var(--green)', bg: 'var(--green-bg)', bd: 'transparent' },

    danger:  { fg: 'var(--red)',   bg: 'var(--red-bg)',   bd: 'transparent' },
    info:    { fg: 'var(--indigo)',bg: 'var(--indigo-bg)',bd: 'transparent' },
    blue:    { fg: 'var(--accent)',bg: '#DBEAFE',         bd: 'transparent' },
  };
  const t = tones[tone] || tones.neutral;
  const sz = size === 'sm'
    ? { fz: 10.5, py: 1, px: 7 }
    : { fz: 11, py: 2, px: 8 };
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: `${sz.py}px ${sz.px}px`,
      borderRadius: 4,
      fontSize: sz.fz,
      fontWeight: 600,
      letterSpacing: '0.02em',
      textTransform: 'uppercase',
      color: t.fg, background: t.bg,
      border: `1px solid ${t.bd}`,
      whiteSpace: 'nowrap',
      lineHeight: 1.4,
      fontFamily: 'inherit',
    }}>{children}</span>
  );
}

function Btn({ children, variant = 'primary', size = 'md', onClick, style = {}, disabled, icon }) {
  const sizes = {
    sm: { fz: 12, py: 5, px: 10, h: 26 },
    md: { fz: 13, py: 6, px: 14, h: 32 },
    lg: { fz: 14, py: 9, px: 18, h: 38 },
  }[size];
  const variants = {
    primary: { bg: 'var(--accent)', fg: '#fff',         bd: 'transparent', hover: 'var(--accent-hover)' },
    secondary:{ bg: 'var(--surface)',fg: 'var(--ink)',  bd: 'var(--line-2)', hover: 'var(--bg)' },
    ghost:   { bg: 'transparent',   fg: 'var(--ink-3)',bd: 'transparent', hover: 'var(--bg)' },
    danger:  { bg: 'var(--surface)',fg: 'var(--red)',  bd: 'var(--line-2)', hover: 'var(--red-bg)' },
    brand:   { bg: 'var(--brand)', fg: '#fff',          bd: 'transparent', hover: 'var(--brand-mid)' },
  };
  const v = variants[variant];
  return (
    <button onClick={onClick} disabled={disabled} style={{
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
      height: sizes.h,
      padding: `0 ${sizes.px}px`,
      borderRadius: 6,
      fontSize: sizes.fz,
      fontWeight: 500,
      letterSpacing: '-0.005em',
      color: v.fg, background: v.bg,
      border: `1px solid ${v.bd === 'transparent' ? v.bg : v.bd}`,
      cursor: disabled ? 'not-allowed' : 'pointer',
      opacity: disabled ? 0.5 : 1,
      transition: 'all 0.12s',
      fontFamily: 'inherit',
      ...style,
    }}
      onMouseEnter={e => { if (!disabled) e.currentTarget.style.background = v.hover; }}
      onMouseLeave={e => { if (!disabled) e.currentTarget.style.background = v.bg; }}>
      {icon && <span style={{ fontSize: sizes.fz + 1 }}>{icon}</span>}
      {children}
    </button>
  );
}

function StatusPill({ status }) {
  const m = {
    analysis:    { tone: 'success', label: 'Analysis Ready' },
    submissions: { tone: 'blue',    label: 'Submissions Open' },
    draft:       { tone: 'neutral', label: 'Draft' },
    sealed:      { tone: 'info',    label: 'Sealed' },
    awarded:     { tone: 'success', label: 'Awarded' },
    archived:    { tone: 'neutral', label: 'Archived' },
  };
  const s = m[status] || m.draft;
  return <Pill tone={s.tone}>{s.label}</Pill>;
}

/* ──────────────────────────────────────────────────────────────────
   PAGE HEADER — page-level title & action bar (Procore pattern)

function PageHeader({ breadcrumb, title, subtitle, actions, tabs, activeTab, onTab }) {
  return (
    <div style={{
      background: 'var(--surface)',
      borderBottom: '1px solid var(--line)',
      padding: '14px 24px 0',
      flexShrink: 0,
    }}>
      {breadcrumb && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: 'var(--muted)', marginBottom: 8 }}>
          {breadcrumb.map((b, i) => (
            <React.Fragment key={i}>
              {i > 0 && <span style={{ color: 'var(--muted-2)' }}>/</span>}
              <span style={{ color: i === breadcrumb.length - 1 ? 'var(--ink-3)' : 'var(--muted)', fontWeight: i === breadcrumb.length - 1 ? 500 : 400 }}>{b}</span>
            </React.Fragment>
          ))}
        </div>
      )}
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16, paddingBottom: tabs ? 10 : 16 }}>
        <div style={{ minWidth: 0, flex: 1 }}>
          <h1 style={{ fontSize: 20, fontWeight: 600, color: 'var(--ink)', letterSpacing: '-0.015em', lineHeight: 1.2 }}>{title}</h1>
          {subtitle && <div style={{ fontSize: 13, color: 'var(--muted)', marginTop: 4 }}>{subtitle}</div>}
        </div>
        {actions && <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>{actions}</div>}
      </div>
      {tabs && (
        <div style={{ display: 'flex', gap: 0, marginTop: 4 }}>
          {tabs.map(t => (
            <button key={t.k} onClick={() => onTab(t.k)} style={{
              padding: '10px 14px',
              fontSize: 13,
              fontWeight: 500,
              color: activeTab === t.k ? 'var(--accent)' : 'var(--ink-3)',
              borderBottom: activeTab === t.k ? '2px solid var(--accent)' : '2px solid transparent',
              cursor: 'pointer',
              transition: 'all 0.12s',
              marginBottom: -1,
              letterSpacing: '-0.005em',
              display: 'flex', alignItems: 'center', gap: 6,
            }}>
              {t.label}
              {t.count !== undefined && (
                <span style={{
                  fontSize: 10, fontWeight: 600,
                  padding: '1px 5px', borderRadius: 8,
                  background: activeTab === t.k ? '#DBEAFE' : 'var(--bg)',
                  color: activeTab === t.k ? 'var(--accent)' : 'var(--muted)',
                  minWidth: 16, textAlign: 'center',
                }}>{t.count}</span>
              )}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function TenderDetail({ tender, onBack, readOnly }) {
  const [tab, setTab] = useState('overview');
  const isMarina = tender.id === 'T-2026-001';

  const invitedCount = (TENDER_INVITATIONS[tender.id] || []).length;
  const tabs = [
    { k: 'overview', label: 'Overview' },
    { k: 'invitations', label: 'Invitations', count: invitedCount },
    { k: 'submissions', label: 'Submissions', count: tender.bidsIn },
    { k: 'analysis', label: 'Analysis' },
    { k: 'risks', label: 'Risks', count: riskCount },
    { k: 'documents', label: 'Documents', count: docCount },
    { k: 'audit', label: 'Audit' },
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', minHeight: 0 }}>
      <PageHeader
        breadcrumb={readOnly ? ['Auditor view', 'Tenders', tender.name] : ['Bluewaters Holdings', 'Tenders', tender.name]}
        title={tender.name}
        subtitle={<>
          <span className="mono" style={{ color: 'var(--muted)' }}>{tender.id}</span>
          <span style={{ color: 'var(--muted-2)', margin: '0 8px' }}>·</span>
          <span>{tender.sub}</span>
          <span style={{ color: 'var(--muted-2)', margin: '0 8px' }}>·</span>
          <span>{tender.location}</span>
          <span style={{ color: 'var(--muted-2)', margin: '0 8px' }}>·</span>
          <StatusPill status={tender.status} />
          {readOnly && <>
            <span style={{ color: 'var(--muted-2)', margin: '0 8px' }}>·</span>
            <Pill tone="neutral">Read-only</Pill>
          </>}
        </>}
        actions={<>
          <Btn variant="secondary" size="md" icon="⤴" onClick={onBack}>Back</Btn>
          <Btn variant="secondary" size="md" icon="⌗">Audit</Btn>
          {isMarina && !readOnly && <Btn variant="primary" size="md" icon="↓">Award Pack PDF</Btn>}
        </>}
        tabs={tabs}
        activeTab={tab}
        onTab={setTab}
      />

      <div style={{ flex: 1, overflowY: 'auto' }}>
        {tab === 'overview' && <OverviewTab tender={tender} readOnly={readOnly} />}
        {tab === 'invitations' && <InvitationsTab tender={tender} readOnly={readOnly} />}
        {tab === 'submissions' && <SubmissionsTab tender={tender} readOnly={readOnly} />}

        {tab === 'documents' && <DocumentsTab tender={tender} readOnly={readOnly} />}

    </div>
  );
}

/* ── SUBMISSIONS TAB ─────────────────────────────────────────────── */
function SubmissionsTab({ tender, readOnly }) {
  const invites = TENDER_INVITATIONS[tender.id] || [];
  const submitted = invites.filter(i => i.status === 'submitted');
  const isMarina = tender.id === 'T-2026-001';

  if (invites.length === 0) {
    return (
      <div style={{ padding: 24 }}>
        <Panel title="Sealed bid submissions">
          <div style={{ padding: 48, textAlign: 'center', color: 'var(--muted)', fontSize: 12 }}>
            No submissions yet. Submissions appear here once invited contractors submit sealed bids.
          </div>
        </Panel>
      </div>
    );
  }

  // For Marina: bids opened, totals visible. For others: sealed, totals hidden.
  return (
    <div style={{ padding: 24 }}>
      {!isMarina && tender.status !== 'analysis' && (
        <div style={{ marginBottom: 12, display: 'flex', alignItems: 'center', gap: 12, padding: '10px 12px', background: '#EBF2FF', border: '1px solid #BFD6FF', borderRadius: 6 }}>
          <span style={{
            width: 18, height: 18, borderRadius: 9, background: 'var(--accent)', color: '#fff',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 10, fontWeight: 700, flexShrink: 0,
          }}>i</span>
          <div style={{ flex: 1, fontSize: 12 }}>
            <div style={{ fontWeight: 600, color: 'var(--accent)' }}>Bids remain sealed until opening</div>
            <div style={{ color: 'var(--ink-3)', marginTop: 1 }}>
              Submission contents are encrypted and cannot be opened until {tender.deadline}. Two-person committee approval required.
            </div>
          </div>
        </div>
      )}
      <Panel title={`Sealed bids — ${submitted.length} of ${invites.length} received`} actions={
        readOnly ? <Btn variant="ghost" size="sm" icon="↓">Export</Btn>
        : isMarina ? <Btn variant="ghost" size="sm" icon="↓">Export</Btn>
        : <Btn variant="secondary" size="sm" icon="✉">Send reminder to non-submitters</Btn>
      }>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
          <thead>
            <tr style={{ background: 'var(--bg)', borderTop: '1px solid var(--line)', borderBottom: '1px solid var(--line)' }}>
              <th style={th}>Contractor</th>
              <th style={{ ...th, width: 140 }}>Submitted</th>
              <th style={{ ...th, width: 140 }}>Sealed Reference</th>
              {isMarina && <th style={{ ...th, width: 110, textAlign: 'right' }}>Bid Total</th>}
              {isMarina && <th style={{ ...th, width: 100, textAlign: 'right' }}>vs Lowest</th>}
              {isMarina && <th style={{ ...th, width: 100, textAlign: 'right' }}>vs Budget</th>}
              <th style={{ ...th, width: 120 }}>Status</th>
              <th style={{ ...th, width: 60 }}></th>
            </tr>
          </thead>
          <tbody>
            {invites.map((inv, i) => {
              const c = getContractor(inv.contractorId);
              const submittedHere = inv.status === 'submitted';
              const bidIdx = isMarina && submittedHere ? BIDDING.findIndex(b => b.name === c.name) : -1;
              const total = bidIdx >= 0 ? TOTALS[bidIdx] : null;
              const lowest = isMarina ? Math.min(...TOTALS) : null;
              const isLowest = total !== null && total === lowest;
              const isHighest = total !== null && total === Math.max(...TOTALS);
              const vsLow = total === null ? '—' : isLowest ? '—' : `+${((total - lowest) / lowest * 100).toFixed(1)}%`;
              const vsBudget = total === null ? '—' : `${total > BUDGET ? '+' : ''}${((total - BUDGET) / BUDGET * 100).toFixed(1)}%`;
              return (
                <tr key={inv.contractorId} style={{
                  borderBottom: i < invites.length - 1 ? '1px solid var(--line)' : 'none',
                  background: i % 2 === 1 ? 'var(--surface-alt)' : 'var(--surface)',
                  opacity: submittedHere ? 1 : 0.65,
                }}>
                  <td style={td}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--ink)' }}>{c.name}</div>
                      {isMarina && isLowest && <Pill tone="success" size="sm">Lowest</Pill>}
                      {isMarina && isHighest && <Pill tone="danger" size="sm">Highest</Pill>}
                    </div>
                  </td>
                  <td className="mono" style={{ ...td, fontSize: 11 }}>{inv.submitted || <span style={{ color: 'var(--muted-2)' }}>—</span>}</td>
                  <td className="mono" style={{ ...td, fontSize: 11, color: 'var(--muted)' }}>{inv.sealedRef || <span style={{ color: 'var(--muted-2)' }}>—</span>}</td>
                  {isMarina && <td className="num" style={{ ...td, textAlign: 'right', fontWeight: 600, color: 'var(--ink)' }}>{total !== null ? fmtShortAED(total) : '—'}</td>}
                  {isMarina && <td className="num" style={{ ...td, textAlign: 'right', color: 'var(--ink-3)' }}>{vsLow}</td>}
                  {isMarina && <td className="num" style={{ ...td, textAlign: 'right', color: total !== null && total > BUDGET ? 'var(--red)' : 'var(--green)', fontWeight: 500 }}>{vsBudget}</td>}
                  <td style={td}>
                    {submittedHere
                      ? <Pill tone={isMarina ? 'success' : 'info'}>{isMarina ? 'Opened' : 'Sealed'}</Pill>
                      : inv.status === 'pending'
                        ? <Pill tone="warning">Pending</Pill>
                        : <Pill tone="neutral">Not viewed</Pill>}
                  </td>
                  <td style={td}>
                    {submittedHere
                      ? <button style={{ fontSize: 12, color: 'var(--accent)', fontWeight: 500, cursor: 'pointer' }}>View</button>
                      : <button style={{ fontSize: 12, color: 'var(--accent)', fontWeight: 500, cursor: 'pointer' }}>Remind</button>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Panel>
    </div>
  );
}

      </div>

      {/* Comparison matrix */}
      <Panel title="Comparison matrix" actions={<>
        <Btn variant="ghost" size="sm" icon="⌕">Filter</Btn>
        <Btn variant="ghost" size="sm" icon="↓">Export</Btn>
      </>}>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11.5, minWidth: 920 }}>
            <thead>
              <tr style={{ background: 'var(--bg)', borderTop: '1px solid var(--line)', borderBottom: '1px solid var(--line)' }}>
                <th style={{ ...th, width: 60 }}>Code</th>
                <th style={th}>Description</th>
                <th style={{ ...th, width: 50, textAlign: 'right' }}>Unit</th>
                <th style={{ ...th, width: 70, textAlign: 'right' }}>Qty</th>
                {BIDDING.map(b => (
                  <th key={b.id} style={{ ...th, width: 96, textAlign: 'right' }}>{b.short}</th>
                ))}
                <th style={{ ...th, width: 60, textAlign: 'right' }}>Spread</th>
              </tr>
            </thead>
            <tbody>
              {BOQ.map((item, i) => {
                const validRates = item.rates.filter(r => r > 0);
                const lo = Math.min(...validRates);
                const hi = Math.max(...validRates);
                const sp = ((hi - lo) / lo * 100).toFixed(0);
                return (
                  <tr key={i} style={{
                    borderBottom: '1px solid var(--line)',
                    background: i % 2 === 1 ? 'var(--surface-alt)' : 'var(--surface)',
                  }}>
                    <td className="mono" style={{ padding: '8px 12px', fontSize: 10.5, color: 'var(--muted)' }}>{item.code}</td>
                    <td style={{ padding: '8px 12px', fontSize: 12, color: 'var(--ink)' }}>{item.desc}</td>
                    <td className="mono" style={{ padding: '8px 12px', fontSize: 11, textAlign: 'right', color: 'var(--muted)' }}>{item.unit}</td>
                    <td className="num" style={{ padding: '8px 12px', fontSize: 11, textAlign: 'right', color: 'var(--ink-3)' }}>{fmt(item.qty)}</td>
                    {item.rates.map((r, ri) => {
                      const isMissing = r === 0;
                      const isLowest = r === lo && !isMissing;
                      const isHighest = r === hi && !isMissing;
                      return (
                        <td key={ri} className="num" style={{
                          padding: '8px 12px',
                          textAlign: 'right',
                          fontSize: 11.5,
                          color: isMissing ? 'var(--red)' : isLowest ? 'var(--green)' : isHighest ? 'var(--red)' : 'var(--ink-3)',
                          fontWeight: isLowest || isHighest || isMissing ? 600 : 400,
                          background: isMissing ? 'var(--red-bg)' : isLowest ? 'rgba(34,197,94,0.04)' : 'transparent',
                        }}>
                          {isMissing ? 'MISSING' : fmt(r)}
                        </td>
                      );
                    })}
                    <td className="num" style={{
                      padding: '8px 12px',
                      textAlign: 'right',
                      fontSize: 11,
                      color: parseInt(sp) > 12 ? 'var(--amber)' : 'var(--muted)',
                      fontWeight: parseInt(sp) > 12 ? 600 : 400,
                    }}>{sp}%</td>
                  </tr>
                );
              })}
              <tr style={{ background: 'var(--brand)', color: '#fff' }}>
                <td colSpan={4} style={{ padding: '11px 12px', fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em' }}>
                  Total Bid Value (AED)
                </td>
                {TOTALS.map((t, i) => {
                  const isLow = t === Math.min(...TOTALS);
                  const isHigh = t === Math.max(...TOTALS);
                  return (
                    <td key={i} className="num" style={{
                      padding: '11px 12px',
                      textAlign: 'right',
                      fontSize: 12,
                      fontWeight: 700,
                      color: isLow ? '#86EFAC' : isHigh ? '#FCA5A5' : '#fff',
                    }}>{fmt(t)}</td>
                  );
                })}
                <td className="num" style={{ padding: '11px 12px', textAlign: 'right', fontSize: 11, fontWeight: 600 }}>
                  {((Math.max(...TOTALS) - Math.min(...TOTALS)) / Math.min(...TOTALS) * 100).toFixed(1)}%
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </Panel>
    </div>
  );
}

              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0' }}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--ink)' }}>R. Al Hajji</div>
                  <div style={{ fontSize: 11, color: 'var(--muted)' }}>Committee · awaiting your action</div>
                </div>
                <Pill tone="warning">Pending</Pill>
              </div>
              <div style={{ marginTop: 16, display: 'flex', flexDirection: 'column', gap: 8 }}>
                <Btn variant="primary" size="lg" onClick={onApprove}>Approve opening (2 of 2)</Btn>
                <Btn variant="danger" size="md">Decline opening</Btn>
              </div>
            </div>
          </Panel>
        </div>
      </div>
    </div>
  );
}

      <PageHeader breadcrumb={['Committee', 'History']} title="Opening history" subtitle={`${COMMITTEE_HISTORY.length} openings witnessed`} actions={<Btn variant="secondary" size="md" icon="↓">Export</Btn>} />

                  <td style={td}>

/* ──────────────────────────────────────────────────────────────────
   AUDITOR ROLE — read-only tenders, audit log, verifications
   ────────────────────────────────────────────────────────────────── */

  return (
    <div>
      <PageHeader breadcrumb={['Auditor view', 'All tenders']} title="All Tenders" subtitle={`${TENDERS.length} tenders · read-only access`} actions={<Btn variant="secondary" size="md" icon="↓">Export</Btn>} />
      <div style={{ padding: 24 }}>
        <div style={{ marginBottom: 12, display: 'flex', alignItems: 'center', gap: 12, padding: '10px 12px', background: 'var(--bg)', border: '1px solid var(--line-2)', borderRadius: 6 }}>
          <span style={{ width: 18, height: 18, borderRadius: 9, background: 'var(--ink-3)', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, flexShrink: 0 }}>👁</span>
          <div style={{ flex: 1, fontSize: 12 }}>
            <div style={{ fontWeight: 600, color: 'var(--ink-3)' }}>Read-only auditor session</div>
            <div style={{ color: 'var(--muted)', marginTop: 1 }}>You have read access to all tender data, bid history, and the immutable audit chain. No modifications can be made.</div>
          </div>
        </div>
        <Panel title="Tenders">
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
            <thead>
              <tr style={{ background: 'var(--bg)', borderTop: '1px solid var(--line)', borderBottom: '1px solid var(--line)' }}>
                <th style={th}>Project</th>
                <th style={{ ...th, width: 110 }}>Tender ID</th>
                <th style={{ ...th, width: 120 }}>Status</th>
                <th style={{ ...th, width: 110, textAlign: 'right' }}>Budget</th>
                <th style={{ ...th, width: 80, textAlign: 'center' }}>Bids</th>
                <th style={{ ...th, width: 120 }}>Audit Chain</th>
                <th style={{ ...th, width: 28 }}></th>
              </tr>

              {TENDERS.map((t, i) => {
                const events = (TENDER_ACTIVITY[t.id] || []).length;

                  <tr key={t.id} onClick={() => onTender(t)} style={{ borderBottom: i < TENDERS.length - 1 ? '1px solid var(--line)' : 'none', cursor: 'pointer', background: i % 2 === 1 ? 'var(--surface-alt)' : 'var(--surface)' }} onMouseEnter={e => e.currentTarget.style.background = 'var(--hover)'} onMouseLeave={e => e.currentTarget.style.background = i % 2 === 1 ? 'var(--surface-alt)' : 'var(--surface)'}>
                    <td style={td}>
                      <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--ink)' }}>{t.name}</div>
                      <div style={{ fontSize: 11, color: 'var(--muted)' }}>{t.sub}</div>

                    <td className="mono" style={{ ...td, fontSize: 11 }}>{t.id}</td>

                    <td style={td}>

                    </td>
                    <td style={{ ...td, textAlign: 'right', color: 'var(--muted-2)' }}>›</td>

          </table>
        </Panel>
      </div>
    </div>
  );

function AuditorVerifications() {

      <PageHeader breadcrumb={['Auditor view', 'Verifications']} title="Chain Verifications" subtitle="Cryptographic integrity proof for every audit chain in the system" />

/* ──────────────────────────────────────────────────────────────────
   APP — orchestrator
   ────────────────────────────────────────────────────────────────── */

function App() {
  const [role, setRole] = useState(null);
  const [tool, setTool] = useState(null);
  const [activeTender, setActiveTender] = useState(null);          // admin & auditor
  const [activeInvitation, setActiveInvitation] = useState(null);  // contractor
  const [activePending, setActivePending] = useState(null);        // committee
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const t = setTimeout(() => setLoading(false), 500);
    return () => clearTimeout(t);
  }, []);

  // Initial tool when role is selected
  const defaultTool = (r) => r === 'admin'      ? 'dashboard'
                          : r === 'contractor'  ? 'dashboard'
                          : r === 'committee'   ? 'pending'
                          :                       'tenders';

  const handlePickRole = (r) => {
    setRole(r);
    setTool(defaultTool(r));
    setActiveTender(null);
    setActiveInvitation(null);
    setActivePending(null);
  };

  const handleSignOut = () => {
    setRole(null); setTool(null);
    setActiveTender(null); setActiveInvitation(null); setActivePending(null);
  };

  const handleToolChange = (t) => {
    setTool(t);
    setActiveTender(null);
    setActiveInvitation(null);
    setActivePending(null);
  };

  if (loading) {
    return <div className="loading"><div className="loading-mark loading-dot">Tenderbox</div></div>;
  }
  if (!role) return <RoleScreen onPick={handlePickRole} />;

  // Build the body for whichever role is signed in
  let body;

  if (role === 'admin') {
    if (activeTender) {
      body = <TenderDetail tender={activeTender} onBack={() => setActiveTender(null)} />;
    } else if (tool === 'newTender') {
      body = <NewTenderWizard onCancel={() => setTool('tenders')} />;
    } else if (tool === 'dashboard') {
      body = <Dashboard onTender={setActiveTender} onTool={setTool} />;
    } else if (tool === 'tenders') {
      body = <TendersList onTender={setActiveTender} />;
    } else if (tool === 'contractors') {
      body = <ContractorsList />;
    } else if (tool === 'analysis') {
      body = <CompanyAnalysis onTender={setActiveTender} />;
    } else if (tool === 'reports') {
      body = <Reports />;
    } else if (tool === 'audit') {
      body = <CompanyAuditLog />;
    } else if (tool === 'team') {
      body = <TeamRoles />;
    } else if (tool === 'settings') {
      body = <Settings />;
    } else {
      body = <Dashboard onTender={setActiveTender} onTool={setTool} />;
    }
  }
  else if (role === 'contractor') {
    if (activeInvitation) {
      body = <ContractorTenderDetail invitation={activeInvitation} onBack={() => setActiveInvitation(null)} />;
    } else if (tool === 'dashboard' || tool === 'invitations') {
      body = <ContractorDashboard onTender={setActiveInvitation} />;
    } else if (tool === 'submissions') {
      body = <ContractorDashboard onTender={setActiveInvitation} />;
    } else if (tool === 'awards') {
      body = <ContractorDashboard onTender={setActiveInvitation} />;
    } else {
      body = <ContractorDashboard onTender={setActiveInvitation} />;
    }
  }
  else if (role === 'committee') {
    if (activePending) {
      body = <CommitteeOpeningCeremony
        pending={activePending}
        onBack={() => setActivePending(null)}
        onApprove={() => setActivePending(null)}
      />;
    } else if (tool === 'pending') {
      body = <CommitteeDashboard onTender={setActivePending} />;
    } else if (tool === 'history') {
      body = <CommitteeHistory />;
    } else {
      body = <CommitteeDashboard onTender={setActivePending} />;
    }
  }
  else if (role === 'auditor') {
    if (activeTender) {
      body = <TenderDetail tender={activeTender} onBack={() => setActiveTender(null)} readOnly={true} />;
    } else if (tool === 'tenders') {
      body = <AuditorTendersList onTender={setActiveTender} />;
    } else if (tool === 'audit') {
      body = <CompanyAuditLog />;
    } else if (tool === 'verifications') {
      body = <AuditorVerifications />;
    } else {
      body = <AuditorTendersList onTender={setActiveTender} />;
    }
  }

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <TopNav role={role} onSignOut={handleSignOut} />
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        <ToolNav active={tool} onChange={handleToolChange} role={role} />
        <main style={{ flex: 1, minWidth: 0, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          {body}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

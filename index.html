function pdfBrandedHeader(doc, title, subtitle) {
  doc.setFillColor(16,20,24);
  doc.rect(0,0,210,22,'F');
  doc.setFillColor(176,97,26);
  doc.rect(0,0,4,22,'F');

  doc.text('tenderbox.ae',198,14,{align:'right'});

  doc.text(title,15,33);
  if(subtitle){doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(110,103,95);doc.text(subtitle,15,39);}
  return 44;
}
function pdfFooter(doc,p,t){
  doc.setDrawColor(216,210,198);doc.line(15,287,195,287);
  doc.setFontSize(7.5);doc.setTextColor(138,129,119);doc.setFont('helvetica','normal');
  doc.text('Generated by Tenderbox · Confidential · '+new Date().toLocaleDateString('en-AE',{day:'numeric',month:'long',year:'numeric'}),15,292);
  doc.text('Page '+p+' of '+t,195,292,{align:'right'});
}
function pdfSectionLabel(doc,label,y){
  doc.setFillColor(241,237,229);doc.rect(15,y,180,7,'F');
  doc.setFontSize(8.5);doc.setTextColor(16,20,24);doc.setFont('helvetica','bold');

}

function Badge({color,children,style={}}) {

  const [form, setForm] = useState({
    name:'',location:'',currency:'AED',deadline:'',openDate:'',
    packages:true,
    contractors:[],
    requirements:{site:true,form:true,addenda:true,programme:true,method:false,insurance:true,exclusions:false}
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const steps = ['Project Details','Requirements','Select Contractors'];

  return (
    <div>
      <TopBar title="New Tender" sub="Complete all steps to send invitations to contractors."/>
      {/* Progress */}
      <div style={{display:'flex',gap:0,marginBottom:28}}>
        {steps.map((s,i) => (
          <div key={i} style={{flex:1,display:'flex',alignItems:'center',gap:0}}>
            <div style={{display:'flex',alignItems:'center',gap:10,flex:1}}>
              <div style={{
                width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:12,fontWeight:700,flexShrink:0,
                background:step>i+1?C.green:step===i+1?C.blue:C.gray200,
                color:step>=i+1?'white':C.gray500
              }}>{step>i+1?'✓':i+1}</div>
              <span style={{fontSize:13,fontWeight:step===i+1?600:400,color:step===i+1?C.navy:C.gray400}}>{s}</span>
            </div>
            {i<steps.length-1 && <div style={{flex:1,height:1,background:step>i+1?C.green:C.gray200,margin:'0 12px'}}/>}
          </div>
        ))}
      </div>

      <Card>
        {step===1 && (
          <div>
            <div style={{fontSize:16,fontWeight:700,color:C.navy,marginBottom:20}}>Project Details</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              {[
                {label:'Tender Name',key:'name',placeholder:'e.g. Marina Views Tower — Main Works'},
                {label:'Project Location',key:'location',placeholder:'e.g. Dubai Marina'},
                {label:'Currency',key:'currency',placeholder:'AED'},
                {label:'Submission Deadline',key:'deadline',type:'date'},
                {label:'Opening Date & Time',key:'openDate',type:'datetime-local'},
              ].map(f => (
                <div key={f.key} style={{display:'flex',flexDirection:'column',gap:5}}>
                  <label style={{fontSize:11,fontWeight:700,color:C.gray700,textTransform:'uppercase',letterSpacing:'.06em'}}>{f.label}</label>
                  <input value={form[f.key]} onChange={e=>set(f.key,e.target.value)} type={f.type||'text'} placeholder={f.placeholder}
                    style={{padding:'10px 12px',border:`1px solid ${C.gray200}`,borderRadius:0,fontSize:14,color:C.text,outline:'none'}}/>
                </div>
              ))}
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                <label style={{fontSize:11,fontWeight:700,color:C.gray700,textTransform:'uppercase',letterSpacing:'.06em'}}>Packages</label>
                <div style={{display:'flex',gap:10}}>
                  {['Single Package','Multiple Packages'].map((p,i) => (
                    <div key={i} onClick={()=>set('packages',i===1)} style={{
                      flex:1,padding:'10px',borderRadius:0,cursor:'pointer',textAlign:'center',fontSize:13,fontWeight:500,
                      border:`1px solid ${form.packages===(i===1)?C.blue:C.gray200}`,
                      background:form.packages===(i===1)?'rgba(176,97,26,.06)':'white',
                      color:form.packages===(i===1)?C.blue:C.gray700
                    }}>{p}</div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}
        {step===2 && (
          <div>
            <div style={{fontSize:16,fontWeight:700,color:C.navy,marginBottom:6}}>Submission Requirements</div>
            <div style={{fontSize:13,color:C.gray500,marginBottom:20}}>Choose what contractors must submit. These become validation rules and appear in the audit report.</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {Object.entries({site:'Site inspection confirmed',form:'Form of tender signed',addenda:'Addenda acknowledged',programme:'Construction programme',method:'Method statement',insurance:'Insurances certificate',exclusions:'Exclusions list',qa:'QA / HSE policies'}).map(([k,label]) => (
                <div key={k} onClick={()=>setForm(f=>({...f,requirements:{...f.requirements,[k]:!f.requirements[k]}}))} style={{
                  display:'flex',alignItems:'center',gap:12,padding:'13px 14px',borderRadius:0,cursor:'pointer',
                  border:`1px solid ${form.requirements[k]?C.blue:C.gray200}`,
                  background:form.requirements[k]?'rgba(176,97,26,.05)':'white',transition:'all .15s'
                }}>
                  <div style={{
                    width:18,height:18,borderRadius:0,border:`2px solid ${form.requirements[k]?C.blue:C.gray300}`,
                    background:form.requirements[k]?C.blue:'white',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .15s'
                  }}>{form.requirements[k]&&<span style={{color:'white',fontSize:11,fontWeight:700}}>✓</span>}</div>
                  <span style={{fontSize:13,fontWeight:500,color:form.requirements[k]?C.navy:C.gray700}}>{label}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {step===3 && (
          <div>
            <div style={{fontSize:16,fontWeight:700,color:C.navy,marginBottom:6}}>Select Contractors</div>
            <div style={{fontSize:13,color:C.gray500,marginBottom:20}}>Invite from your pre-qualified contractor database. They'll receive an invitation with sealed submission instructions.</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {DEMO_CONTRACTORS.filter(c=>c.status==='approved').map(c => {
                const selected = form.contractors.includes(c.id);
                return (
                  <div key={c.id} onClick={()=>setForm(f=>({...f,contractors:selected?f.contractors.filter(x=>x!==c.id):[...f.contractors,c.id]}))} style={{
                    display:'flex',alignItems:'center',gap:14,padding:'13px 14px',borderRadius:0,cursor:'pointer',
                    border:`1px solid ${selected?C.blue:C.gray200}`,background:selected?'rgba(176,97,26,.05)':'white',transition:'all .15s'
                  }}>
                    <div style={{width:18,height:18,borderRadius:0,border:`2px solid ${selected?C.blue:C.gray300}`,background:selected?C.blue:'white',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .15s'}}>
                      {selected&&<span style={{color:'white',fontSize:11,fontWeight:700}}>✓</span>}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:600,color:C.navy}}>{c.name}</div>
                      <div style={{fontSize:12,color:C.gray400,marginTop:2}}>{c.disciplines.join(' · ')} · {c.region}</div>
                    </div>
                    <Badge color={c.grade==='A'?'blue':c.grade==='B'?'teal':'gray'}>Grade {c.grade}</Badge>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div style={{display:'flex',justifyContent:'space-between',marginTop:24,paddingTop:20,borderTop:`1px solid ${C.gray200}`}}>
          <Btn variant="outline" onClick={()=>step>1?setStep(s=>s-1):setPage('tenders')}>← {step>1?'Back':'Cancel'}</Btn>
          {step<3
            ? <Btn onClick={()=>setStep(s=>s+1)}>Continue →</Btn>
            : <Btn style={{background:C.green}}>Send Invitations ✓</Btn>}
        </div>
      </Card>
    </div>
  );
}

// ── OPENING CEREMONY ──────────────────────────────────────────────────
function OpeningCeremony({setPage}) {
  const [step, setStep] = useState(0);
  // 0=pre-open, 1=approving, 2=opening, 3=opened
  const [approved, setApproved] = useState([]);
  const approvers = ['Graham Stevens (Client Admin)','Rania Al Hajji (QS Lead)'];
  const [progress, setProgress] = useState(0);

  function handleOpen() {
    setStep(2);
    let p = 0;
    const iv = setInterval(()=>{p+=4;setProgress(p);if(p>=100){clearInterval(iv);setStep(3);}},50);
  }

  return (
    <div>
      <TopBar title="Opening Ceremony" sub="Marina Views — Main Works · T-2026-001"/>
      <div style={{maxWidth:680,margin:'0 auto'}}>
        {step===0 && (
          <Card>
            <div style={{textAlign:'center',padding:'20px 0 10px'}}>
              <div style={{fontSize:48,marginBottom:16}}>🔏</div>
              <div style={{fontFamily:HEAD_FONT,fontSize:20,fontWeight:800,color:C.navy,marginBottom:8}}>4 Sealed Bids Received</div>
              <div style={{fontSize:14,color:C.gray500,marginBottom:28,lineHeight:1.6}}>
                All bids are cryptographically sealed. No bid values have been accessed.<br/>
                Opening requires approval from 2 authorised committee members.
              </div>
              <div style={{background:C.gray50,borderRadius:0,padding:16,marginBottom:20,textAlign:'left'}}>
                {[
                  ['Meridian Contracting LLC','Submitted 08:47'],
                  ['Crescent Gulf Engineering','Submitted 07:22'],
                  ['Stonebridge','Submitted Yesterday 17:55'],
                  ['Atlas Construction Group','Submitted Yesterday 14:30'],
                ].map(([name,time]) => (
                  <div key={name} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:`1px solid ${C.gray200}`,fontSize:13}}>
                    <span style={{fontWeight:600,color:C.navy}}>🔒 {name}</span>
                    <span style={{color:C.gray400}}>{time}</span>
                  </div>
                ))}
              </div>
              <Btn onClick={()=>setStep(1)} style={{fontSize:15,padding:'12px 32px'}}>Proceed to Approval →</Btn>
            </div>
          </Card>
        )}
        {step===1 && (
          <Card>
            <div style={{fontSize:17,fontWeight:700,color:C.navy,marginBottom:6}}>Committee Approval Required</div>
            <div style={{fontSize:13,color:C.gray500,marginBottom:20}}>Both committee members must approve before bids are unsealed.</div>
            {approvers.map((a,i) => (
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px',borderRadius:0,border:`1px solid ${approved.includes(i)?C.green:C.gray200}`,background:approved.includes(i)?'rgba(30,127,79,.05)':'white',marginBottom:10,transition:'all .2s'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:36,height:36,borderRadius:50,background:approved.includes(i)?'rgba(30,127,79,.1)':C.gray100,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>
                    {approved.includes(i)?'✅':'👤'}
                  </div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:C.navy}}>{a}</div>
                    <div style={{fontSize:11,color:C.gray400}}>{approved.includes(i)?'✓ Approved':'Pending approval'}</div>
                  </div>
                </div>
                {!approved.includes(i) && <Btn onClick={()=>setApproved(p=>[...p,i])} variant="teal" style={{fontSize:12,padding:'7px 14px'}}>Approve</Btn>}
                {approved.includes(i) && <Badge color="green">Approved ✓</Badge>}
              </div>
            ))}
            {approved.length===2 && (
              <div style={{marginTop:16,textAlign:'center'}}>
                <div style={{fontSize:13,color:C.green,fontWeight:600,marginBottom:12}}>✓ Both approvals received. Ready to open.</div>
                <Btn onClick={handleOpen} style={{background:C.navy,fontSize:15,padding:'12px 32px'}}>🔓 Open All Bids</Btn>
              </div>
            )}
          </Card>
        )}
        {step===2 && (
          <Card style={{textAlign:'center',padding:40}}>
            <div style={{fontSize:40,marginBottom:20}}>⚙️</div>
            <div style={{fontSize:18,fontWeight:700,color:C.navy,marginBottom:8}}>Opening Bids...</div>
            <div style={{fontSize:13,color:C.gray500,marginBottom:24}}>Decrypting submissions and extracting BOQ data</div>
            <div style={{height:8,background:C.gray200,borderRadius:2,overflow:'hidden',marginBottom:16}}>
              <div style={{height:'100%',background:`linear-gradient(90deg,${C.blue},${C.sky})`,borderRadius:2,width:`${progress}%`,transition:'width .1s'}}/>
            </div>
            <div style={{fontSize:13,color:C.gray400}}>
              {progress<30?'Verifying bid integrity...':progress<60?'Parsing BOQ line items...':progress<90?'Running AI analysis...':'Generating comparison matrix...'}
            </div>
          </Card>
        )}
        {step===3 && (
          <Card style={{textAlign:'center',padding:32}}>
            <div style={{fontSize:48,marginBottom:16}}>✅</div>
            <div style={{fontFamily:HEAD_FONT,fontSize:20,fontWeight:800,color:C.navy,marginBottom:8}}>All Bids Opened Successfully</div>
            <div style={{fontSize:14,color:C.gray500,marginBottom:24}}>
              Minutes of opening have been auto-generated and saved to the audit log.<br/>
              AI analysis complete at 09:02: comparison matrix ready 2 minutes after unsealing.

  function cellColor(val, rowIdx) {
    if(!val) return {bg:'rgba(179,54,43,.08)',color:'#B3362B'};
    const rowRates = BOQ_ITEMS[rowIdx].rates.filter(r=>r>0);
    const min = Math.min(...rowRates), max = Math.max(...rowRates);
    if(val===min) return {bg:'rgba(30,127,79,.1)',color:'#1E7F4F'};
    if(val===max) return {bg:'rgba(179,54,43,.1)',color:'#B3362B'};
    return {bg:'transparent',color:C.gray700};
  }

  const negSchedule = BOQ_ITEMS.map(item => {
    const rate = item.rates[selectedContractor];
    const lowRate = Math.min(...item.rates.filter(r=>r>0));
    const gap = rate>0?rate-lowRate:0;
    const gapTotal = gap*item.qty;
    const isOutlier = rate>0 && (rate/lowRate-1)>0.1;
    return {...item, rate, gap, gapTotal, isOutlier};

            <div key={k}>
              <div style={{fontSize:11,color:C.gray400,marginBottom:2}}>{k}</div>
              <div style={{fontSize:13,fontWeight:600,color:C.navy}}>{v}</div>
            </div>
          ))}
        </div>
        {!submitted ? (
          <div style={{marginTop:16}}>
            <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:10}}>Submission Checklist</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {[
                {label:'Priced BOQ (Excel)',required:true,icon:'📊'},
                {label:'Form of Tender (signed)',required:true,icon:'📝'},
                {label:'Construction Programme',required:true,icon:'📅'},
                {label:'Insurance Certificate',required:true,icon:'🛡️'},
                {label:'Addenda Acknowledgement',required:true,icon:'✉️'},
              ].map((item,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:C.gray50,borderRadius:0,border:`1px solid ${C.gray200}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:16}}>{item.icon}</span>
                    <span style={{fontSize:13,fontWeight:500,color:C.navy}}>{item.label}</span>
                    {item.required&&<Badge color="red" style={{fontSize:9}}>Required</Badge>}
                  </div>
                  <Btn variant="outline" style={{fontSize:11,padding:'5px 12px'}}>Upload</Btn>
                </div>
              ))}
            </div>
            <div style={{marginTop:16,padding:12,background:'rgba(176,97,26,.05)',borderRadius:0,border:`1px solid rgba(176,97,26,.15)`,fontSize:12,color:C.blue}}>
              🔒 Your bid will be cryptographically sealed on submission. No one can access bid values until the official opening time on 13 Mar 2026 at 09:00.
            </div>
            <Btn onClick={()=>setSubmitted(true)} style={{marginTop:14,width:'100%',justifyContent:'center',fontSize:14,padding:12}}>Submit Sealed Bid →</Btn>
          </div>
        ) : (
          <div style={{marginTop:16,textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:36,marginBottom:12}}>🔒</div>
            <div style={{fontSize:16,fontWeight:700,color:C.green,marginBottom:6}}>Bid Successfully Sealed</div>
            <div style={{fontSize:13,color:C.gray500,marginBottom:12}}>Receipt: <strong>TB-2026-001-4</strong> · Submitted: 08:47, 13 Mar 2026</div>
            <div style={{fontSize:12,color:C.gray400,marginBottom:16}}>Your bid is sealed until the official opening on 13 Mar 2026 at 09:00.<br/>You will be notified when results are available.</div>
            <Btn onClick={downloadSubmissionPDF} variant="outline" style={{fontSize:12,padding:'8px 20px'}}>⬇ Download Bid Submission Receipt</Btn>
          </div>
        )}
      </Card>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────
function App() {
  const [role, setRole] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [activeTender, setActiveTender] = useState(null);

  if(!role) return <LoginScreen onLogin={r=>{setRole(r);setPage(r==='contractor'?'portal':r==='auditor'?'audit':'dashboard');}}/>;

  const renderPage = () => {
    switch(page) {
      case 'dashboard':     return <Dashboard setPage={setPage} setActiveTender={setActiveTender}/>;
      case 'tenders':       return <Dashboard setPage={setPage} setActiveTender={setActiveTender}/>;
      case 'tender-detail': return <TenderDetail tender={activeTender} setPage={setPage}/>;
      case 'create-tender': return <CreateTender setPage={setPage}/>;
      case 'opening':       return <OpeningCeremony setPage={setPage}/>;
      case 'analysis':      return <AnalysisView setPage={setPage}/>;
      case 'contractors':   return <ContractorsPage/>;
      case 'audit':         return <AuditLog/>;
      case 'portal':        return <ContractorPortal setPage={setPage}/>;
      default:              return <Dashboard setPage={setPage} setActiveTender={setActiveTender}/>;
    }
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar page={page} setPage={setPage} role={role} onLogout={()=>{setRole(null);setPage('dashboard');}}/>
      <div style={{flex:1,overflow:'auto',padding:28,background:C.gray50}}>
        {renderPage()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

function Btn({children,variant='primary',onClick,style={},disabled=false}) {
  const styles = {
    primary:{background:C.blue,color:'white',border:'none'},
    outline:{background:'white',color:C.navy,border:`1px solid ${C.gray200}`},
    ghost:{background:'transparent',color:C.gray500,border:'none'},
    danger:{background:C.red,color:'white',border:'none'},
    teal:{background:C.teal,color:'white',border:'none'},
    navy:{background:C.navy,color:'white',border:'none'},
  };
  return (
    <button disabled={disabled} onClick={onClick} style={{
      display:'inline-flex',alignItems:'center',gap:6,padding:'9px 18px',
      borderRadius:0,fontSize:13,fontWeight:600,cursor:disabled?'not-allowed':'pointer',
      transition:'all .18s',opacity:disabled?.5:1,...styles[variant],...style
    }}>{children}</button>
  );
}

function Card({children,style={}}) {
  return <div style={{background:'white',borderRadius:0,border:`1px solid ${C.gray200}`,padding:24,...style}}>{children}</div>;
}

// ── CREATE TENDER WIZARD ──────────────────────────────────────────────
function CreateTender({setPage}) {
  const [step, setStep] = useState(1);
  const [sent, setSent] = useState(false);
  const [form, setForm] = useState({
    name:'',location:'',currency:'AED',deadline:'',openDate:'',
    packages:true,
    tenderType:'works', route:'fast',
    contractors:[],
    requirements:{site:true,form:true,addenda:true,programme:true,method:false,insurance:true,exclusions:false}
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const steps = ['Project Details','Requirements','Select Contractors'];

  return (
    <div>
      <TopBar title="New Tender" sub="Complete all steps to send invitations to contractors."/>
      {/* Progress */}
      <div style={{display:'flex',gap:0,marginBottom:28}}>
        {steps.map((s,i) => (
          <div key={i} style={{flex:1,display:'flex',alignItems:'center',gap:0}}>
            <div style={{display:'flex',alignItems:'center',gap:10,flex:1}}>
              <div style={{
                width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:12,fontWeight:700,flexShrink:0,
                background:step>i+1?C.green:step===i+1?C.blue:C.gray200,
                color:step>=i+1?'white':C.gray500
              }}>{step>i+1?'✓':i+1}</div>
              <span style={{fontSize:13,fontWeight:step===i+1?600:400,color:step===i+1?C.navy:C.gray400}}>{s}</span>
            </div>
            {i<steps.length-1 && <div style={{flex:1,height:1,background:step>i+1?C.green:C.gray200,margin:'0 12px'}}/>}
          </div>
        ))}
      </div>

      <Card>
        {step===1 && (
          <div>
            <div style={{fontSize:16,fontWeight:700,color:C.navy,marginBottom:20}}>Project Details</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>

        </div>
      </Card>
    </div>
  );
}

function AnalysisView({setPage, awardApproval}) {
  const [activeTab, setActiveTab] = useState('matrix');
  const [selectedContractor, setSelectedContractor] = useState(0);
  const [matrixView, setMatrixView] = useState('summary');
  const [detailSection, setDetailSection] = useState(0);
  const spread = ((TOTALS[3]-TOTALS[0])/TOTALS[0]*100).toFixed(1);
  const vsbudget = ((TOTALS[0]-BUDGET)/BUDGET*100).toFixed(1);

  function cellColor(val, rates) {
    if(!val) return {bg:'rgba(179,54,43,.08)',color:'#B3362B'};
    const rowRates = rates.filter(r=>r>0);
    const min = Math.min(...rowRates), max = Math.max(...rowRates);
    if(min===max) return {bg:'transparent',color:C.gray700}; // locked PS/DW rows carry identical values
    if(val===min) return {bg:'rgba(30,127,79,.1)',color:'#1E7F4F'};
    if(val===max) return {bg:'rgba(179,54,43,.1)',color:'#B3362B'};
    return {bg:'transparent',color:C.gray700};
  }

  // Section totals: per contractor, sum of qty x rate for member items (0 = unpriced item in section)
  const sectionRows = SECTION_MAP.map(sec=>{
    const items = sectionItems(sec);
    const totals = [0,1,2,3].map(ci=>items.reduce((sum,it)=>sum + (it.rates[ci]>0 ? it.qty*it.rates[ci] : 0),0));
    const complete = [0,1,2,3].map(ci=>items.every(it=>it.rates[ci]>0));
    return {name:sec.name,items,totals,complete};
  });

  const negSchedule = BOQ_ITEMS.map(item => {
    const rate = item.rates[selectedContractor];
    const lowRate = Math.min(...item.rates.filter(r=>r>0));
    const gap = rate>0?rate-lowRate:0;
    const gapTotal = gap*item.qty;
    const isOutlier = rate>0 && (rate/lowRate-1)>0.1;
    return {...item, rate, gap, gapTotal, isOutlier};
  }).filter(r=>r.gap>0);

  return (
    <div>
      <TopBar
        title="Commercial Analysis"
        sub={PROJECT_SHORT+' · Opened 13 Mar 2026, 09:00'}
        actions={[
          <Badge key="env" color="teal">Fast-track · Single envelope</Badge>,

          <Btn key="a" variant="outline" onClick={downloadAnalysisPDF}>⬇ Analysis Report</Btn>,
          <Btn key="p" onClick={downloadAwardRecommendationPDF}>⬇ Recommendation for Award</Btn>,
          <span key="loa" title={awardApproval?('Award approved by '+awardApproval.by+' · '+awardApproval.at):'Enabled once the Award Approval e-gate is recorded on the tender overview'}>
            <Btn variant="navy" disabled={!awardApproval} onClick={downloadLOAPDF}>⬇ LOA</Btn>
          </span>
        ]}
      />
      {/* Opening-day proof strip */}
      <div style={{background:C.blue,border:`1px solid ${C.blueHover}`,padding:'13px 18px',marginBottom:20,display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'rgba(255,255,255,.85)',border:'1px solid rgba(255,255,255,.35)',padding:'3px 8px'}}>Opening Day</span>
        <span style={{fontFamily:HEAD_FONT,fontSize:14,fontWeight:700,color:'white'}}>Analysis completed at opening · 09:02 · two minutes after unsealing</span>
        <span style={{marginLeft:'auto',fontSize:12,fontWeight:500,color:'rgba(255,255,255,.75)'}}>Opening day is decision day</span>
      </div>
      {/* Summary stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        {[
          {label:'Lowest Bid',val:fmtShort(TOTALS[0]),sub:'Meridian Contracting LLC',color:C.green},
          {label:'Highest Bid',val:fmtShort(TOTALS[3]),sub:'Atlas Construction Group',color:C.red},
          {label:'Spread (L–H)',val:spread+'%',sub:'Opportunity to negotiate',color:C.gold},
          {label:'vs Budget',val:(vsbudget>0?'+':'')+vsbudget+'%',sub:'AED '+Number(BUDGET).toLocaleString(),color:parseFloat(vsbudget)<0?C.green:C.red},
        ].map((s,i)=>(
          <div key={i} title="View the comparison matrix" onClick={()=>{setActiveTab('matrix');setMatrixView('summary');}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(176,97,26,.05)';e.currentTarget.style.borderColor=C.blue;}}
            onMouseLeave={e=>{e.currentTarget.style.background='white';e.currentTarget.style.borderColor=C.gray200;}}
            style={{background:'white',border:`1px solid ${C.gray200}`,padding:18,cursor:'pointer',transition:'all .15s'}}>
            <div style={{fontSize:12,color:C.gray500,marginBottom:4}}>{s.label} <span style={{color:C.blue,fontWeight:700}}>→</span></div>
            <div style={{fontFamily:HEAD_FONT,fontSize:24,fontWeight:900,color:s.color,letterSpacing:'-0.5px'}}>{s.val}</div>

            </table>

      {activeTab==='risks' && (

          {[

            {sev:'medium',title:'HVAC rate outlier: Atlas Construction Group',detail:'Atlas Construction Group HVAC rate (AED 2,400,000) is 14.3% above the median. Investigate whether this reflects a scope difference or pricing error.',contractor:'Atlas Construction Group',val:'AED 300,000 above median'},
            {sev:'medium',title:'Large spread on RC Columns: 13.5%',detail:'Rate spread for RC Columns & Shear Walls (C.03) exceeds 10%. Meridian at AED 1,850 vs Stonebridge at AED 2,100/m³. Verify specification assumptions are consistent.',contractor:'All contractors',val:'AED 225,000 total spread'},

          ].map((r,i)=>(
            <Card key={i} style={{borderLeft:`3px solid ${r.sev==='high'?C.red:r.sev==='medium'?C.gold:C.blue}`,padding:'16px 20px'}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <Badge color={r.sev==='high'?'red':r.sev==='medium'?'gold':'blue'}>{r.sev.toUpperCase()} RISK</Badge>
                    <span style={{fontSize:14,fontWeight:700,color:C.navy}}>{r.title}</span>
                  </div>
                  <p style={{fontSize:13,color:C.gray500,lineHeight:1.6,marginBottom:8}}>{r.detail}</p>
                  <div style={{display:'flex',gap:16,fontSize:12}}>
                    <span style={{color:C.gray400}}>Contractor: <strong style={{color:C.navy}}>{r.contractor}</strong></span>
                    <span style={{color:C.gray400}}>Impact: <strong style={{color:r.sev==='high'?C.red:C.gold}}>{r.val}</strong></span>
                  </div>

              </div>

          ))}
          <div style={{padding:'12px 14px',background:C.gray50,border:`1px solid ${C.gray200}`,fontSize:12,color:C.gray500}}>
            These flags are not chased individually. Every flag is compiled into the relevant tenderer's standard negotiation pack, so all tenderers respond to the same structure on the same deadline.{' '}
            <span onClick={()=>setActiveTab('packs')} style={{color:C.blue,fontWeight:700,cursor:'pointer',textDecoration:'underline'}}>Open the Negotiation Packs tab →</span>
          </div>
        </div>
      )}

      {activeTab==='packs' && (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <Card style={{background:C.navy,border:'none'}}>
            <div style={{fontSize:12,fontWeight:700,color:C.sky,letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>Round 1 · Standard Negotiation Packs</div>
            <div style={{fontSize:13,color:'rgba(255,255,255,.85)',lineHeight:1.65,marginBottom:10}}>
              Every tenderer receives the same standard pack and the same response window. No tenderer receives any other tenderer's identity or individual pricing; aggregated field statistics (medians and ranges) are issued equally to all tenderers. Each pack covers the arithmetic check, missing items, high and low rate outliers, provisional sum changes, preliminaries as a percentage of tender, OH&P mark-up, and qualifications to withdraw.
            </div>
            <div style={{fontSize:12,fontWeight:600,color:C.sky,marginBottom:10}}>Responses due: 20 March 2026, 17:00 UAE time · Sealed resubmission via the platform</div>
            <div style={{fontSize:12,color:'rgba(255,255,255,.7)',lineHeight:1.6}}>
              Tenderers respond in the portal item by item (revise, substantiate, confirm or withdraw), e-sign a declaration, and their response is sealed until the response deadline. Re-comparison runs the moment responses unseal.
            </div>
          </Card>
          <Card style={{padding:0,overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'2fr 110px 90px 90px 160px 150px',padding:'12px 20px',borderBottom:`1px solid ${C.gray200}`,fontSize:11,fontWeight:700,letterSpacing:.6,textTransform:'uppercase',color:C.gray400}}>
              <div>Tenderer</div><div style={{textAlign:'right'}}>Items Flagged</div><div style={{textAlign:'right'}}>Prelims %</div><div style={{textAlign:'right'}}>OH&P %</div><div style={{textAlign:'right'}}>Response</div><div style={{textAlign:'right'}}>Pack</div>
            </div>
            {CONTRACTORS_BIDDING.map((c,i)=>{
              const responded = i<2;
              return (
              <div key={i} style={{display:'grid',gridTemplateColumns:'2fr 110px 90px 90px 160px 150px',alignItems:'center',padding:'13px 20px',borderBottom:i<3?`1px solid ${C.gray100}`:'none'}}>
                <div style={{fontSize:13,fontWeight:600,color:C.navy}}>{c.name}</div>
                <div style={{textAlign:'right',fontSize:13,fontWeight:700,color:NEG_DATA[i].flags>=8?C.red:C.navy,fontVariantNumeric:'tabular-nums'}}>{NEG_DATA[i].flags}</div>
                <div style={{textAlign:'right',fontSize:13,color:NEG_DATA[i].prelims>10.5?C.gold:C.gray700,fontVariantNumeric:'tabular-nums'}}>{NEG_DATA[i].prelims.toFixed(1)}%</div>
                <div style={{textAlign:'right',fontSize:13,color:C.gray700,fontVariantNumeric:'tabular-nums'}}>{NEG_DATA[i].ohp.toFixed(1)}%</div>

// ── CONTRACTORS PAGE ──────────────────────────────────────────────────
function starText(s){
  const full = Math.floor(s);
  return '★'.repeat(full) + '☆'.repeat(5-full);
}
function ExpiryBadge({d}) {
  if(!d.flag) return null;
  return <Badge color={d.flag==='expired'?'red':'gold'} style={{fontSize:9,marginLeft:8}}>{d.flag==='expired'?'EXPIRED':'EXPIRING SOON'}</Badge>;
}
function ContractorsPage() {
  const [filter, setFilter] = useState('all');
  const [sortKey, setSortKey] = useState('name');
  const [sortDir, setSortDir] = useState('asc');
  const [expanded, setExpanded] = useState(null);
  const [rows, setRows] = useState(DEMO_CONTRACTORS);
  const [showAdd, setShowAdd] = useState(false);
  const [addForm, setAddForm] = useState({name:'',trade:'Main Contractor',contact:'',phone:'',grade:'B'});
  const setAdd = (k,v) => setAddForm(f=>({...f,[k]:v}));
  const canAdd = addForm.name.trim()!=='' && addForm.contact.trim()!=='';
  function handleAdd(){
    if(!canAdd) return;
    const nextId = Math.max(...rows.map(r=>r.id))+1;
    setRows(rs=>[...rs,{id:nextId,name:addForm.name.trim(),grade:addForm.grade,trade:addForm.trade,disciplines:[addForm.trade],region:'Dubai',status:'pending',contact:addForm.contact.trim(),email:'',phone:addForm.phone.trim()||'—',prequalified:false,stars:3.0,type:'contractor'}]);
    setAddForm({name:'',trade:'Main Contractor',contact:'',phone:'',grade:'B'});
    setShowAdd(false);
  }
  const chips = [
    {id:'all',label:'All'},
    {id:'contractor',label:'Contractors'},
    {id:'consultant',label:'Consultants'},
    {id:'approved',label:'Approved'},
    {id:'pending',label:'Pending'},
  ];
  const filtered = rows.filter(c=>{
    if(filter==='all') return true;
    if(filter==='contractor'||filter==='consultant') return c.type===filter;
    return c.status===filter;
  });
  const cols = [
    {key:'name',label:'Name',align:'left'},
    {key:'trade',label:'Trade',align:'left'},
    {key:'contact',label:'Contact Person',align:'left'},
    {key:'phone',label:'Contact Number',align:'left'},
    {key:'prequalified',label:'Prequalified',align:'center'},
    {key:'grade',label:'Grade',align:'center'},
    {key:'stars',label:'Rating',align:'right'},
  ];
  const sorted = [...filtered].sort((a,b)=>{
    let av=a[sortKey], bv=b[sortKey];
    if(sortKey==='prequalified'){av=a.prequalified?1:0;bv=b.prequalified?1:0;}
    let r;
    if(typeof av==='number') r = av-bv;
    else r = String(av).localeCompare(String(bv));
    return sortDir==='asc'?r:-r;
  });
  const handleSort = (key)=>{
    if(sortKey===key) setSortDir(d=>d==='asc'?'desc':'asc');
    else { setSortKey(key); setSortDir('asc'); }
  };
  const nContractors = rows.filter(c=>c.type==='contractor').length;
  const nConsultants = rows.filter(c=>c.type==='consultant').length;
  const nApproved = rows.filter(c=>c.status==='approved').length;
  const nPending = rows.filter(c=>c.status==='pending').length;
  return (
    <div>
      <TopBar title="Contractor Database" sub={`${nContractors} contractors · ${nConsultants} consultants · ${nApproved} approved · ${nPending} pending review`}
        actions={[<Btn key="add" onClick={()=>setShowAdd(s=>!s)}>{showAdd?'Close form':'+ Add Contractor'}</Btn>]}/>
      {showAdd && (
        <Card style={{marginBottom:20,borderTop:`3px solid ${C.blue}`}}>
          <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:4}}>Add Contractor</div>
          <div style={{fontSize:12,color:C.gray500,marginBottom:16}}>New vendors enter as Pending until PQQ documents are reviewed and approved.</div>
          <div style={{display:'grid',gridTemplateColumns:'2fr 1.4fr 1.4fr 1.2fr 90px',gap:12,alignItems:'end'}}>
            {[
              {label:'Company Name',key:'name',placeholder:'e.g. Palm Ridge Contracting LLC'},
              {label:'Contact Person',key:'contact',placeholder:'Full name'},
              {label:'Contact Number',key:'phone',placeholder:'+971 5x xxx xxxx'},
            ].map(f=>(
              <div key={f.key} style={{display:'flex',flexDirection:'column',gap:5}}>
                <label style={{fontSize:11,fontWeight:700,color:C.gray700,textTransform:'uppercase',letterSpacing:'.06em'}}>{f.label}</label>
                <input value={addForm[f.key]} onChange={e=>setAdd(f.key,e.target.value)} placeholder={f.placeholder}
                  style={{padding:'9px 11px',border:`1px solid ${C.gray200}`,borderRadius:0,fontSize:13,color:C.text,outline:'none'}}/>
              </div>
            ))}
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              <label style={{fontSize:11,fontWeight:700,color:C.gray700,textTransform:'uppercase',letterSpacing:'.06em'}}>Trade</label>
              <select value={addForm.trade} onChange={e=>setAdd('trade',e.target.value)}
                style={{padding:'9px 11px',border:`1px solid ${C.gray200}`,borderRadius:0,fontSize:13,color:C.navy,background:'white',outline:'none'}}>
                {['Main Contractor','MEP','Fit-out','Facades','Civil','Structural'].map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              <label style={{fontSize:11,fontWeight:700,color:C.gray700,textTransform:'uppercase',letterSpacing:'.06em'}}>Grade</label>
              <select value={addForm.grade} onChange={e=>setAdd('grade',e.target.value)}
                style={{padding:'9px 11px',border:`1px solid ${C.gray200}`,borderRadius:0,fontSize:13,color:C.navy,background:'white',outline:'none'}}>
                {['A','B','C'].map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:16,paddingTop:14,borderTop:`1px solid ${C.gray100}`}}>
            <Btn variant="outline" onClick={()=>setShowAdd(false)}>Cancel</Btn>
            <Btn disabled={!canAdd} onClick={handleAdd}>Add to Database</Btn>
          </div>
        </Card>
      )}
      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {chips.map(f=>(
          <div key={f.id} onClick={()=>setFilter(f.id)} style={{
            padding:'7px 14px',borderRadius:0,cursor:'pointer',fontSize:13,fontWeight:500,
            border:`1px solid ${filter===f.id?C.blue:C.gray200}`,
            background:filter===f.id?'rgba(176,97,26,.07)':'white',
            color:filter===f.id?C.blue:C.gray700
          }}>{f.label}</div>
        ))}
      </div>
      <Card style={{padding:0,overflow:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead>
            <tr style={{background:C.gray50,borderBottom:`1px solid ${C.gray200}`}}>
              {cols.map(col=>(
                <th key={col.key} onClick={()=>handleSort(col.key)} style={{
                  padding:'10px 16px',textAlign:col.align,fontSize:11,fontWeight:700,color:sortKey===col.key?C.blue:C.gray500,
                  letterSpacing:'.05em',textTransform:'uppercase',cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'
                }}>
                  {col.label}{sortKey===col.key ? (sortDir==='asc'?' ▲':' ▼') : ''}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sorted.map((c,i)=>{
              const pqq = PQQ_DATA[c.id];
              const isOpen = expanded===c.id;
              return (
              <React.Fragment key={c.id}>
              <tr onClick={()=>setExpanded(isOpen?null:c.id)} style={{borderBottom:i<sorted.length-1||isOpen?`1px solid ${C.gray100}`:'none',background:isOpen?'rgba(176,97,26,.04)':i%2===0?'white':C.gray50,cursor:'pointer'}}>
                <td style={{padding:'12px 16px'}}>
                  <div style={{fontSize:13,fontWeight:600,color:C.navy}}>{c.name} <span style={{color:C.gray400,fontSize:11,marginLeft:6}}>{isOpen?'▾':'▸'}</span></div>
                  <div style={{fontSize:11,color:C.gray400,marginTop:2}}>{c.type==='consultant'?'Consultant':'Contractor'} · {c.region}</div>
                </td>
                <td style={{padding:'12px 16px',color:C.gray700}}>{c.trade}</td>
                <td style={{padding:'12px 16px',color:C.gray700}}>{c.contact}</td>
                <td style={{padding:'12px 16px',color:C.gray500,fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap'}}>{c.phone}</td>
                <td style={{padding:'12px 16px',textAlign:'center'}}>
                  <Badge color={c.prequalified?'green':'gold'}>{c.prequalified?'Yes':'No'}</Badge>
                </td>
                <td style={{padding:'12px 16px',textAlign:'center'}}>
                  <Badge color={c.grade==='A'?'blue':c.grade==='B'?'teal':'gray'}>{c.grade}</Badge>
                </td>
                <td style={{padding:'12px 16px',textAlign:'right',whiteSpace:'nowrap'}}>
                  <span style={{color:C.gold,letterSpacing:1}}>{starText(c.stars)}</span>
                  <span style={{color:C.gray500,marginLeft:8,fontVariantNumeric:'tabular-nums'}}>{c.stars.toFixed(1)}</span>
                </td>
              </tr>
              {isOpen && pqq && (
                <tr style={{borderBottom:i<sorted.length-1?`1px solid ${C.gray100}`:'none'}}>
                  <td colSpan={7} style={{padding:0}}>
                    <div style={{background:C.gray50,borderTop:`2px solid ${C.blue}`,padding:'18px 20px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
                        <div style={{fontSize:12,fontWeight:700,color:C.navy,letterSpacing:'.06em',textTransform:'uppercase'}}>PQQ Summary · {c.name}</div>
                        {!c.prequalified && pqq.insurance.flag==='expired'
                          ? <Badge color="red">Prequalification withheld: insurance expired</Badge>
                          : !c.prequalified
                            ? <Badge color="gold">PQQ under review</Badge>

              <div style={{marginTop:10,fontSize:11,color:C.gray400,lineHeight:1.5}}>Notified 12 Mar 08:47; resubmission allowed until the deadline. Unpriced items deemed included unless clarified. Validation is automated and visible only to the tenderer; the bid remains sealed from every other party.</div>

            <Btn onClick={downloadSubmissionPDF} variant="outline" style={{fontSize:12,padding:'8px 20px'}}>⬇ Download Bid Submission Receipt</Btn>
          </div>
        )}
      </Card>
      <Card style={{borderTop:`3px solid ${C.gold}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
              <div style={{fontSize:15,fontWeight:700,color:C.navy}}>Round 1 Negotiation Pack received</div>
              <Badge color="gold">Response open</Badge>
            </div>
            <div style={{fontSize:13,color:C.gray500}}>Issued 13 Mar 2026, 14:00 · 6 response items · Respond by 20 Mar 2026, 17:00 (UAE Time)</div>
            <div style={{fontSize:12,color:C.gray400,marginTop:6}}>Identical forms, identical deadline for every tenderer. Your sealed response cannot be read by any party before the deadline.</div>
          </div>
          <Btn variant="navy" onClick={()=>setShowRound1(true)}>View Round 1 Response Form →</Btn>
        </div>
      </Card>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────
function App() {
  const [role, setRole] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [activeTender, setActiveTender] = useState(null);
  const [awardApproval, setAwardApproval] = useState(null); // null until the Award Approval e-gate is recorded

  if(!role) return <LoginScreen onLogin={r=>{setRole(r);setPage(r==='contractor'?'portal':r==='committee'?'opening':r==='auditor'?'tenders':'dashboard');}}/>;

  const isAdmin = role==='admin';
  const roleHome = () =>
    role==='contractor' ? <ContractorPortal setPage={setPage}/>
    : role==='committee' ? <OpeningCeremony setPage={setPage}/>
    : role==='auditor' ? <TendersPage setPage={setPage} setActiveTender={setActiveTender} role={role}/>
    : <Dashboard setPage={setPage} setActiveTender={setActiveTender} awardApproval={awardApproval}/>;

  const renderPage = () => {
    switch(page) {
      case 'dashboard':     return isAdmin ? <Dashboard setPage={setPage} setActiveTender={setActiveTender} awardApproval={awardApproval}/> : roleHome();
      case 'tenders':       return <TendersPage setPage={setPage} setActiveTender={setActiveTender} role={role}/>;
      case 'tender-detail': return <TenderDetail tender={activeTender} setPage={setPage} role={role} awardApproval={awardApproval} onApproveAward={()=>setAwardApproval({by:'S. Al Suwaidi, Client Representative',at:'28 Mar 2026, 11:20'})}/>;
      case 'create-tender': return isAdmin ? <CreateTender setPage={setPage}/> : roleHome();
      case 'opening':       return <OpeningCeremony setPage={setPage}/>;
      case 'analysis':      return <AnalysisView setPage={setPage} awardApproval={awardApproval}/>;
      case 'contractors':   return isAdmin ? <ContractorsPage/> : roleHome();
      case 'audit':         return <AuditLog/>;
      case 'portal':        return <ContractorPortal setPage={setPage}/>;
      case 'submit':        return <ContractorPortal setPage={setPage}/>;
      case 'round1':        return <Round1ResponseScreen onBack={()=>setPage('portal')}/>;
      default:              return roleHome();
    }
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar page={page} setPage={setPage} role={role} onLogout={()=>{setRole(null);setPage('dashboard');}}/>
      <div style={{flex:1,overflow:'auto',padding:28,background:C.gray50}}>
        {renderPage()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
